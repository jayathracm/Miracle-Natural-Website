name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production

env:
  AWS_REGION: eu-west-2
  S3_BUCKET: itsaro.com
  CLOUDFRONT_DIST_ID: EL1HJ9SKK1K8O

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build the project
      run: npm run build

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Deploy to S3
      run: |
        aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete --region ${{ env.AWS_REGION }}

    - name: Invalidate CloudFront cache and wait for completion
      run: |
        # Create invalidation and get the invalidation ID
        INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} \
            --paths "/*" \
            --region ${{ env.AWS_REGION }} \
            --query 'Invalidation.Id' \
            --output text)
          
        # Wait for invalidation to complete
        echo "Waiting for invalidation $INVALIDATION_ID to complete..."
        aws cloudfront wait invalidation-completed \
            --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} \
            --id $INVALIDATION_ID \
            --region ${{ env.AWS_REGION }}
        echo "Invalidation $INVALIDATION_ID completed"

    - name: Deployment Status
      if: success()
      run: echo "Frontend deployed successfully to production!"