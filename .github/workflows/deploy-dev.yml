name: Deploy to Dev

on:
  push:
    branches: [ development ]

env:
  AWS_REGION: eu-west-2
  ECR_REPO: 633697711542.dkr.ecr.eu-west-2.amazonaws.com/project-sun-marketing-web
  CONTAINER_NAME: projectsun-marketing-web-dev
  EC2_HOST: 3.8.43.94
  EC2_USER: ubuntu

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: 'development'
        fetch-depth: 0
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    
    - name: Get commit ID
      id: commit
      run: echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ env.ECR_REPO }}:${{ env.COMMIT_ID }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Deploy to EC2
      env:
        SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts
        
        # Stop and remove existing container
        ssh -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
          "docker rm -f ${{ env.CONTAINER_NAME }} || true"
        
        # Login to ECR on EC2
        ssh ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
          "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REPO }}"
        
        # Pull and run the new image
        ssh ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
          "docker pull ${{ env.ECR_REPO }}:${{ env.COMMIT_ID }} && \
           docker run -d -p 5173:80 --name ${{ env.CONTAINER_NAME }} ${{ env.ECR_REPO }}:${{ env.COMMIT_ID }}"
    
    - name: Clean up
      run: |
        docker rmi -f ${{ env.ECR_REPO }}:${{ env.COMMIT_ID }} || true
        docker image prune -f