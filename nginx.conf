server {
    listen 80;
    server_name dev.itsaro.com;

    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://www.gstatic.com https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.calendly.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://www.google.com https://formsubmit.co; frame-src 'self' https://www.google.com https://calendly.com; object-src 'none'; base-uri 'self'; form-action 'self' https://formsubmit.co;" always;
    
    # Strict Transport Security (HSTS) - Enable when HTTPS is configured
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Cross-Origin-Opener-Policy
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    
    # Cross-Origin-Resource-Policy
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    location / {
        try_files $uri /index.html;
    }

    # Custom 404 response without separate page
    error_page 404 = @custom_404;

    location @custom_404 {
        return 404 '404 Not Found: The requested resource could not be found.';
        add_header Content-Type text/plain;
    }
}
